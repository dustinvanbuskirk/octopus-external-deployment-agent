# Octopus Kubernetes Agent Registration Config
# -----------------------------------------------
# Copy this file and rename it for your target, e.g.:
#   dvb-finance-1.ini
#   dvb-health-pilot.ini
#
# Point the script at a config by setting:
#   export AGENT_REG_CONFIG=dvb-finance-1.ini
#
# SENSITIVE: Do NOT store AgentRegistration.ApiKey in this file.
# Set it as an environment variable instead:
#   export AGENT_REG_APIKEY="API-xxxxxxxxxxxx"
#
# If AGENT_REG_APIKEY is not set, the script will look for the key
# in this file as a last resort and emit a warning.

[octopus]
# Base URL of your Octopus server
ServerUri = https://your-instance.octopus.app

# Space ID to register the agent into, e.g. Spaces-1
SpaceId = Spaces-1

[agent]
# Display name for the agent as it appears in Infrastructure > Deployment Targets
Name = my-k8s-agent

# Polling URI from the agent ConfigMap:
#   kubectl get cm -n octopus-agent tentacle-config -o yaml
Uri = poll://replace-with-agent-uri/

# Certificate thumbprint from the same ConfigMap
Thumbprint = REPLACE_WITH_THUMBPRINT

# Comma-separated list of environment names the agent will serve
EnvironmentNames = Development,Test

# Comma-separated list of target roles to assign
Roles = k8s-agent

# Optional: assign the agent to a worker pool as well.
# Leave blank to skip.
WorkerPoolName =

# SENSITIVE — prefer setting AGENT_REG_APIKEY env var instead.
# Only populate this as a last resort in non-production/lab scenarios.
# ApiKey = API-xxxxxxxxxxxx